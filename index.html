<!DOCTYPE html>
<html>
<head>
  <title>MatchPredicta</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      margin-top: 20px;
    }

    input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
  display: block;
}
    label {
  display: block;
  margin-top: 15px;
  text-align: left;
      }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>MatchPredicta</h1>
<p>Predict Team A (Home) vs Team B (Away)</p>
<p>Powered by Rennes Model</p>

<div class="box">
  <label>Team A (Home)</label>
  <input type="text" id="teamA" placeholder="e.g. Arsenal">

  <label>Team B (Away)</label>
  <input type="text" id="teamB" placeholder="e.g. Chelsea">
  

  <label>Are both teams within ten points off each other?</label>
  <select id="parity">
    <option value="yes">Yes</option>
    <option value="no">No</option>
  </select>

  <label>Team A Goal Scoring Ability (Home)</label>
  <select id="scoring">
    <option value="good">Good</option>
    <option value="medium">Medium</option>
    <option value="bad">Bad</option>
  </select>

  <label>Team A Form</label>
  <select id="form">
    <option value="good">Good</option>
    <option value="medium">Medium</option>
    <option value="bad">Bad</option>
  </select>

  <button onclick="predict()">Predict</button>

  <div id="result"></div>

</div>

<script>
async function predict() {

  const teamA = document.getElementById("teamA").value;
  const teamB = document.getElementById("teamB").value;
  const parity = document.getElementById("parity").value;
  const scoring = document.getElementById("scoring").value;
  const form = document.getElementById("form").value;

  try {
    const res = await fetch("https://matchpredicta.onrender.com/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ parity, scoring, form })
    });

    const data = await res.json();

    let finalResult = data.result;

    if (data.result === "Team A Wins") {
    finalResult = teamA + " Wins";
    }
    else if (data.result === "Team A Loses") {
    finalResult = teamB + " Wins";
    }
    else if (data.result === "Draw") {
    finalResult = teamA + " vs " + teamB + " Draw";
    }

    document.getElementById("result").innerText =
    teamA + " vs " + teamB + ": " +
    finalResult + " (Confidence: " + data.confidence + "%)";
  } catch (err) {
    document.getElementById("result").innerText = "Error connecting to server";
  }
}
</script>

</body>
</html>
